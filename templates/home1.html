{% load static %}

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Asilbek Sadullayev - Backend dasturchi, Django va Python mutaxassisi">
    <meta name="keywords" content="Django, Python, Backend Developer, Portfolio">
    <title>Asilbek Sadullayev | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        .menu-open { display: block !important; }
        .typing-text {
            color: red;
            width: 20ch;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 2s steps(20) infinite alternate-reverse;
        }
        @keyframes typing {
            from { width: 0ch; }
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav id="navbar" class="fixed top-0 w-full bg-gray-800 bg-opacity-90 shadow-lg py-4 z-50 transition-all">
        <div class="container mx-auto flex justify-between items-center px-6">
            <h1 class="text-xl font-bold text-yellow-500">Asilbek</h1>
            <button id="menu-toggle" class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <ul id="menu" class="hidden md:flex space-x-6 text-lg absolute md:relative top-16 md:top-0 left-0 w-full md:w-auto bg-gray-800 md:bg-transparent p-6 md:p-0 shadow-lg md:shadow-none">
                {% for item in menu_items %}
                    <li><a href="#{{ item.id }}" class="hover:text-yellow-500 transition">{{ item.name }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </nav>
    <section id="home" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <img src="/static/images/profile.jpg" onerror="this.src='/static/images/default.jpg'" alt="Asilbek" class="w-32 h-32 md:w-40 md:h-40 rounded-full shadow-lg">
        <h1 class="text-3xl sm:text-5xl font-bold mt-4 typing-text">Asilbek Sadullayev</h1>
        <p class="text-gray-400 text-lg sm:text-xl mt-2">Backend Dasturchi | Django & Python</p>
    </section>

    {% for section in sections %}
    <section id="{{ section.id }}" class="py-16 px-4 text-center">
        <h2 class="text-2xl sm:text-4xl font-semibold mb-4">{{ section.title }}</h2>
        <p class="max-w-2xl mx-auto text-gray-300 text-lg">{{ section.content }}</p>
    </section>
    {% endfor %}

    <script>
        gsap.from("section", { duration: 1, opacity: 0, y: 50, stagger: 0.3 });
        document.getElementById("menu-toggle").addEventListener("click", function () {
            document.getElementById("menu").classList.toggle("hidden");
        });
    </script>
</body>
</html>
